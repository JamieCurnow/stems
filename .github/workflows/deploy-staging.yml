name: Deploy staging

# Triggers:
#  - Every push to main (staging is meant to burn, that's the point).
#  - Manual run from the Actions tab if you want to redeploy a previous
#    commit without pushing.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Don't allow two staging deploys to overlap. Newer one cancels older.
concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  deploy:
    # Auto-deploy is gated on a repo variable so this template (and any fresh
    # copy) stays green on `main` until Cloudflare is provisioned — without it,
    # `npm ci`/wrangler would fail on every push against placeholder config.
    # Flip it on once staging D1 + secrets exist: repo Settings → Secrets and
    # variables → Actions → Variables → New variable → DEPLOY_ENABLED = true.
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: staging
      # No custom domain yet — staging deploys to workers.dev. Update to the
      # assigned workers.dev URL after the first deploy (or restore the custom
      # domain once stems.market is purchased).
      url: https://stems-staging.workers.dev

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=6144

      - name: Apply D1 migrations (staging)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Forward-only. If you ship a destructive migration (drop table,
          # rename column), pause this step and apply manually.
          # `--env staging` is REQUIRED — without it wrangler resolves the
          # DB via the top-level d1_databases binding (placeholder UUID).
          command: d1 migrations apply stems-staging --remote --env staging

      - name: Deploy worker (staging)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env staging
